<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Recursos Humanos | Sanilab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #11201c;
            --paper: #f3efe6;
            --accent: #1f6b54;
            --accent-soft: #d8e6df;
            --gold: #c9a24b;
            --line: #d9d3c4;
            --user-bubble: #e9e3d4;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at 15% 20%, #e9efe9 0%, var(--paper) 45%, #ece6d8 100%);
            color: var(--ink);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }
        /* grain + ambient shapes */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle at 85% 15%, rgba(31,107,84,0.10), transparent 40%),
                radial-gradient(circle at 10% 90%, rgba(201,162,75,0.12), transparent 45%);
            pointer-events: none;
        }
        .chat-container {
            position: relative;
            background: rgba(255,255,255,0.72);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            width: 100%;
            max-width: 620px;
            border-radius: 22px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow:
                0 1px 0 rgba(255,255,255,0.9) inset,
                0 30px 60px -20px rgba(17,32,28,0.30);
            padding: 38px 36px 32px;
            animation: rise 0.7s cubic-bezier(0.16,1,0.3,1) both;
        }
        @keyframes rise {
            from { opacity: 0; transform: translateY(24px) scale(0.98); }
            to { opacity: 1; transform: none; }
        }
        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 10px;
        }
        .eyebrow .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-soft);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        h2 {
            font-family: 'Fraunces', serif;
            font-weight: 500;
            color: var(--ink);
            margin: 0 0 6px;
            font-size: 34px;
            letter-spacing: -0.01em;
            line-height: 1.05;
        }
        h2 span { color: var(--accent); font-style: italic; }
        .subtitle {
            font-size: 13px;
            color: #6c7670;
            margin: 0 0 26px;
        }
        #chat-box {
            border: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(255,255,255,0.5), rgba(243,239,230,0.4));
            padding: 20px;
            height: 320px;
            overflow-y: auto;
            margin-bottom: 22px;
            border-radius: 16px;
            line-height: 1.55;
            font-size: 14px;
            scroll-behavior: smooth;
        }
        #chat-box::-webkit-scrollbar { width: 8px; }
        #chat-box::-webkit-scrollbar-thumb {
            background: var(--line); border-radius: 8px;
        }
        .mensaje-usuario {
            color: var(--ink);
            margin: 0 0 12px auto;
            text-align: left;
            background: var(--user-bubble);
            padding: 10px 14px;
            border-radius: 14px 14px 4px 14px;
            max-width: 78%;
            width: fit-content;
            box-shadow: 0 2px 6px rgba(17,32,28,0.05);
            animation: pop 0.35s ease both;
        }
        .mensaje-usuario strong { color: var(--accent); font-weight: 600; }
        .mensaje-ia {
            color: var(--ink);
            font-weight: 400;
            margin: 0 0 16px;
            border-left: 3px solid var(--gold);
            padding: 4px 0 4px 14px;
            max-width: 88%;
            animation: pop 0.35s ease both;
        }
        .mensaje-ia strong { color: var(--accent); font-weight: 600; }
        .mensaje-ia em { color: #7a8580; }
        @keyframes pop {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: none; }
        }
        .input-group {
            display: flex;
            gap: 10px;
            background: rgba(255,255,255,0.85);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 6px;
            transition: border-color 0.25s, box-shadow 0.25s;
        }
        .input-group:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-soft);
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 14px;
            border: none;
            background: transparent;
            font-family: 'Outfit', sans-serif;
            font-size: 14.5px;
            color: var(--ink);
            outline: none;
        }
        input[type="text"]::placeholder { color: #9aa39d; }
        button {
            padding: 12px 24px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.02em;
            transition: transform 0.15s, background-color 0.25s, box-shadow 0.25s;
            box-shadow: 0 6px 14px -4px rgba(31,107,84,0.5);
        }
        button:hover {
            background: #185544;
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -6px rgba(31,107,84,0.55);
        }
        button:active { transform: translateY(0); }
        .footer-note {
            text-align: center;
            font-size: 11px;
            color: #9aa39d;
            margin-top: 16px;
            letter-spacing: 0.04em;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <span class="eyebrow"><span class="dot"></span>Sanilab · Reclutamiento</span>
        <h2>Asistente <span>IA</span></h2>
        <p class="subtitle">Consulta inteligente sobre la base de postulantes</p>
        <div id="chat-box">
            <div class="mensaje-ia"><em>Conectado a la base de postulantes. Escribe tu consulta abajo.</em></div>
        </div>
        
        <div class="input-group">
            <input type="text" id="pregunta" placeholder="¿Cuántos postulantes hay para sistemas??">
            <button onclick="consultarIA()">Consultar</button>
        </div>
        <p class="footer-note">Portal interno de Recursos Humanos</p>
    </div>

    <script>
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbx4o5r68qea2EKhNS3q8ToCq3hYjnwbyA0bFnqsDfAuegdcoOEcJGWhcYpMMUX-H9es/exec'; 

        const inputPregunta = document.getElementById('pregunta');
        
        inputPregunta.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                consultarIA();
            }
        });

        async function consultarIA() {
            const pregunta = inputPregunta.value.trim();
            const chatBox = document.getElementById('chat-box');
            
            if(!pregunta) return;
            
            chatBox.innerHTML += `<div class="mensaje-usuario"><strong>Tú:</strong> ${pregunta}</div>`;
            chatBox.innerHTML += `<div class="mensaje-ia" id="loading"><em>Consultando registros...</em></div>`;
            
            inputPregunta.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(scriptUrl, {
                    method: 'POST',
                    body: JSON.stringify({ pregunta: pregunta }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                
                const data = await response.json();
                
                document.getElementById('loading').remove();
                
                if(data.respuesta) {
                    chatBox.innerHTML += `<div class="mensaje-ia"><strong>IA:</strong> ${data.respuesta}</div>`;
                } else {
                    chatBox.innerHTML += `<div class="mensaje-ia" style="color:red; border-left-color: red;"><strong>Error del servidor:</strong> ${data.error}</div>`;
                }
            } catch (error) {
                if(document.getElementById('loading')) document.getElementById('loading').remove();
                chatBox.innerHTML += `<div class="mensaje-ia" style="color:red; border-left-color: red;"><strong>Error de red:</strong> No se pudo conectar con Apps Script.</div>`;
            }
            
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
